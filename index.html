<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Layout Studio</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>

<div class="toolbar">
  <span class="brand">Layout Studio</span>
  <button id="bgBtn" type="button">設定底圖</button>
  <button id="addBtn" type="button">新增圖片</button>
  <div class="divider"></div>
  <button id="groupBtn" type="button">群組</button>
  <button id="ungroupBtn" type="button">解散</button>
  <button id="forwardBtn" type="button">上移</button>
  <button id="backwardBtn" type="button">下移</button>
  <button id="frontBtn" type="button">置頂</button>
  <button id="backBtn" type="button">置底</button>
  <div class="divider"></div>
  <button class="icon" id="zoomOutBtn" type="button">−</button>
  <span id="zoomLabel">100%</span>
  <button class="icon" id="zoomInBtn" type="button">+</button>
  <button id="fitBtn" type="button">適合</button>
  <div class="divider"></div>
  <button id="undoBtn" type="button">復原</button>
  <button id="newBtn" type="button">新建</button>
  <button class="danger" id="delBtn" type="button">刪除</button>
  <button class="primary" id="exportBtn" type="button">匯出 HTML</button>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-header">圖層</div>
    <div class="layer-list" id="layerList">
      <div class="layer-empty">尚無圖片</div>
    </div>
    <div class="properties" id="properties" style="display:none">
      <div class="properties-header">群組屬性</div>
      <div id="propertiesBody"></div>
    </div>
  </aside>

  <div class="stage" id="stage">
    <div class="canvas" id="canvas">
      <div class="empty-hint" id="hint">請設定底圖,或直接把圖片拖進畫布</div>
    </div>
  </div>
</div>

<input type="file" id="bgInput" accept="image/*" style="display:none">
<input type="file" id="addInput" accept="image/*" multiple style="display:none">

<script src="editor.js"></script>
</body>
</html>
